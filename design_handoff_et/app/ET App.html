<style>
  html, body { margin: 0; padding: 0; background: #0d0d10; min-height: 100vh; font-family: 'Inter Tight', -apple-system, system-ui, sans-serif; }
  * { box-sizing: border-box; }
  #root { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .et-scroll::-webkit-scrollbar { width: 0; height: 0; }
  .et-scroll { scrollbar-width: none; }
  @media (prefers-reduced-motion: no-preference) {
    .et2-blink { animation: et2Blink 1s steps(2) infinite; }
  }
  @keyframes et2Blink { 50% { opacity: 0; } }
  .peg-dot { animation: pegDot 1s ease-in-out infinite; }
  @keyframes pegDot { 0%, 60%, 100% { opacity: 0.3; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-3px); } }
</style>
</head>
