<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="ext-resource-dependency" content="et-logo.webm" data-resource-id="etLogo" />
<title>Elite Transition: Earn more than you owned.</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,600&family=JetBrains+Mono:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { margin: 0; background: #000; color: #fff; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
  #app { min-height: 100vh; }
  ::selection { background: #1E5BFF; color: #fff; }
  a { color: inherit; }

  @keyframes etFeedScroll { from { transform: translateY(0); } to { transform: translateY(-50%); } }
  .split-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }
  .split-grid.reverse .split-media { order: -1; }
  @media (max-width: 900px) {
    .split-grid { grid-template-columns: 1fr !important; gap: 40px; }
    .split-grid .split-media { order: 0 !important; }
  }

  /* responsive */
  @media (max-width: 900px) {
    .hero-grid { grid-template-columns: 1fr !important; }
    .hero-phone { margin-top: 48px; }
    .feature-row { grid-template-columns: 1fr !important; gap: 28px !important; }
    .feature-row .feature-phone { order: 1 !important; }
    .feature-row > div:last-child { order: 2 !important; }
    .game-grid { grid-template-columns: 1fr !important; }
    .footer-grid { grid-template-columns: 1fr 1fr !important; }
    .nav-links { display: none !important; }
  }
  @media (max-width: 560px) {
    .footer-grid { grid-template-columns: 1fr !important; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#000000">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#000000"></rect>
    <rect x="520" y="300" width="160" height="160" rx="44" fill="#1E5BFF"></rect>
    <text x="600" y="412" font-family="Inter Tight, sans-serif" font-size="86" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-4">ET</text>
  </svg>
</template>
<div id="app"></div>

<script src="image-slot.js"></script>
<script type="text/babel" src="et2-ui.jsx"></script>
<script type="text/babel" src="et2-pegasus.jsx"></script>
<script type="text/babel" src="video/et-reel-kit.jsx"></script>
<script type="text/babel" src="video/et-reel-screens.jsx"></script>
<script type="text/babel" src="journey/et-journey-screens.jsx"></script>
<script type="text/babel" src="et-landing-1.jsx"></script>
<script type="text/babel" src="et-landing-3.jsx"></script>
<script type="text/babel" src="et-landing-motion.jsx"></script>
<script type="text/babel" src="et-landing-2.jsx"></script>
<script type="text/babel" data-presets="react">
  const mount = () => {
    if (!window.LandingApp) { setTimeout(mount, 40); return; }
    ReactDOM.createRoot(document.getElementById('app')).render(<LandingApp />);
  };
  mount();
</script>
</body>
</html>
